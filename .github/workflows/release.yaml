name: Releases

on:
  push:
    tags:
    - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Unshallow
      run: git fetch --prune --unshallow
    # git-cliff-action defaults its output file to git-cliff/CHANGELOG.md. Give each
    # git-cliff step an explicit, distinct --output path so the --bumped-version step
    # below does not clobber the generated changelog used for the release notes.
    - name: Generate changelog
      id: changelog
      uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
      with:
        args: --latest --strip header --output git-cliff/RELEASE_NOTES.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Compute expected version
      id: expected_version
      uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
      with:
        args: --bumped-version --output git-cliff/bumped-version.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Validate semver bump
      env:
        TAG_NAME: ${{ github.ref_name }}
        EXPECTED_VERSION: ${{ steps.expected_version.outputs.content }}
      run: |
        # git-cliff computes the minimum required version based on conventional commits
        expected="${EXPECTED_VERSION}"
        actual="${TAG_NAME}"

        echo "Minimum required version: $expected"
        echo "Actual tag: $actual"

        # Compare major.minor.patch — actual must be >= expected
        IFS='.' read -r exp_major exp_minor exp_patch <<< "${expected#v}"
        IFS='.' read -r act_major act_minor act_patch <<< "${actual#v}"

        if [ "$act_major" -gt "$exp_major" ]; then
          echo "Semver validation passed (major exceeds minimum)."
          exit 0
        elif [ "$act_major" -lt "$exp_major" ]; then
          echo "::error::Tag $actual does not meet minimum required version $expected (major version too low)"
          exit 1
        fi

        if [ "$act_minor" -gt "$exp_minor" ]; then
          echo "Semver validation passed (minor exceeds minimum)."
          exit 0
        elif [ "$act_minor" -lt "$exp_minor" ]; then
          echo "::error::Tag $actual does not meet minimum required version $expected (minor version too low)"
          exit 1
        fi

        if [ "$act_patch" -lt "$exp_patch" ]; then
          echo "::error::Tag $actual does not meet minimum required version $expected (patch version too low)"
          exit 1
        fi

        echo "Semver validation passed."
    - run: ./hack/merge-crds.sh
    - uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
      with:
        allowUpdates: true
        artifacts: "dist/*"
        bodyFile: ${{ steps.changelog.outputs.changelog }}

    - name: Install crane
      uses: imjasonh/setup-crane@6da1ae018866400525525ce74ff892880c099987 # v0.5

    - name: Install syft
      uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

    - name: Install up CLI
      uses: upbound/action-up@2c4d9663b902087b0808b79fe2c7ec68424d87d8 # v1.2.0
      with:
        skip-login: true

    - name: Get Upbound Credentials from Vault
      uses: grafana/shared-workflows/actions/get-vault-secrets@a53fc80bc30b0a16a262520465db899fa3af08b7 # get-vault-secrets/v1.3.2
      with:
        common_secrets: |
          UPBOUND_MARKETPLACE_PUSH_ROBOT_ID=upbound:access-id
          UPBOUND_MARKETPLACE_PUSH_ROBOT_TOKEN=upbound:token

    - name: Login to Upbound
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      if: env.UPBOUND_MARKETPLACE_PUSH_ROBOT_ID != ''
      with:
        registry: xpkg.upbound.io
        username: ${{ env.UPBOUND_MARKETPLACE_PUSH_ROBOT_ID }}
        password: ${{ env.UPBOUND_MARKETPLACE_PUSH_ROBOT_TOKEN }}

    - name: Prepare Marketplace extensions
      if: env.UPBOUND_MARKETPLACE_PUSH_ROBOT_ID != ''
      run: |
        VERSION="${GITHUB_REF#refs/tags/}"
        REF="xpkg.upbound.io/grafana/provider-grafana:${VERSION}"

        # Wait for the package to be available (published by ci_tag workflow)
        for i in $(seq 1 30); do
          crane digest "${REF}" 2>/dev/null && break
          echo "Waiting for ${REF} to be available... (attempt ${i}/30)"
          sleep 30
        done

        DIGEST=$(crane digest "${REF}" 2>/dev/null) || { echo "::error::Package ${REF} not found after waiting"; exit 1; }

        # SBOM
        mkdir -p extensions/sbom
        syft "${REF}@${DIGEST}" -o spdx-json=extensions/sbom/sbom.spdx.json

        # Release notes
        mkdir -p extensions/release-notes
        cp "${{ steps.changelog.outputs.changelog }}" extensions/release-notes/release_notes.md

        # Readme
        mkdir -p extensions/readme
        cp README.md extensions/readme/readme.md

        # Icon is already committed at extensions/icons/icon.svg

    - name: Append extensions to Marketplace
      if: env.UPBOUND_MARKETPLACE_PUSH_ROBOT_ID != ''
      run: |
        VERSION="${GITHUB_REF#refs/tags/}"
        up alpha xpkg append \
          --extensions-root=./extensions \
          "xpkg.upbound.io/grafana/provider-grafana:${VERSION}"

  deploy:
    name: Trigger Argo Workflow Deployment
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Deploying version: ${VERSION}"
          echo "Docker image: crossplane/provider-grafana:${VERSION}"

      - name: Trigger Argo Workflow
        id: trigger-argo-workflow
        uses: grafana/shared-workflows/actions/trigger-argo-workflow@8269e9362f30c5458c2cad54510ea74fd053920c # trigger-argo-workflow/v1.3.0
        with:
          namespace: platform-monitoring-cd
          workflow_template: crossplane-provider-grafana
          parameters: |
            dockertag=${{ steps.version.outputs.version }}
            prCommentContext= Triggered by release ${{ steps.version.outputs.version }} in crossplane/crossplane-provider-grafana
            commit_author=grafana-delivery-bot
