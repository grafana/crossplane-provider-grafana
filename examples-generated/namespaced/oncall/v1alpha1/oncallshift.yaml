apiVersion: oncall.grafana.m.crossplane.io/v1alpha1
kind: OnCallShift
metadata:
  annotations:
    meta.upbound.io/example-id: oncall/v1alpha1/oncallshift
  labels:
    testing.upbound.io/example-name: example_shift
  name: example-shift
  namespace: upbound-system
spec:
  forProvider:
    byDay:
    - MO
    - FR
    duration: ${60 * 30}
    frequency: weekly
    interval: 2
    name: Example Shift
    start: 2020-09-07T14:00:00
    teamSelector:
      matchLabels:
        testing.upbound.io/example-name: grafana_oncall_team
    timeZone: UTC
    type: recurrent_event
    usersRef:
    - name: grafana_oncall_user
    weekStart: MO
