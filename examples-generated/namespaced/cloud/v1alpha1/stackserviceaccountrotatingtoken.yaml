apiVersion: cloud.grafana.m.crossplane.io/v1alpha1
kind: StackServiceAccountRotatingToken
metadata:
  annotations:
    meta.upbound.io/example-id: cloud/v1alpha1/stackserviceaccountrotatingtoken
  labels:
    testing.upbound.io/example-name: foo
  name: foo
  namespace: upbound-system
spec:
  forProvider:
    cloudStackSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    earlyRotationWindowSeconds: 604800
    namePrefix: key_foo
    secondsToLive: 7776000
    serviceAccountSelector:
      matchLabels:
        testing.upbound.io/example-name: cloud_sa

---

apiVersion: cloud.grafana.m.crossplane.io/v1alpha1
kind: StackServiceAccount
metadata:
  annotations:
    meta.upbound.io/example-id: cloud/v1alpha1/stackserviceaccountrotatingtoken
  labels:
    testing.upbound.io/example-name: cloud_sa
  name: cloud-sa
  namespace: upbound-system
spec:
  forProvider:
    cloudStackSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    isDisabled: false
    name: cloud service account
    role: Admin
