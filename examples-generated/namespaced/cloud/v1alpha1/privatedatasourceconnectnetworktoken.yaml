apiVersion: cloud.grafana.m.crossplane.io/v1alpha1
kind: PrivateDataSourceConnectNetworkToken
metadata:
  annotations:
    meta.upbound.io/example-id: cloud/v1alpha1/privatedatasourceconnectnetworktoken
  labels:
    testing.upbound.io/example-name: test
  name: test
  namespace: upbound-system
spec:
  forProvider:
    displayName: My PDC Token
    name: my-pdc-token
    pdcNetworkSelector:
      matchLabels:
        testing.upbound.io/example-name: test
    region: prod-us-east-0

---

apiVersion: cloud.grafana.m.crossplane.io/v1alpha1
kind: PrivateDataSourceConnectNetwork
metadata:
  annotations:
    meta.upbound.io/example-id: cloud/v1alpha1/privatedatasourceconnectnetworktoken
  labels:
    testing.upbound.io/example-name: test
  name: test
  namespace: upbound-system
spec:
  forProvider:
    cloudStackSelector:
      matchLabels:
        testing.upbound.io/example-name: grafana_cloud_stack
    displayName: My PDC
    name: my-pdc
    region: prod-us-east-0
