apiVersion: cloudprovider.grafana.m.crossplane.io/v1alpha1
kind: AzureCredential
metadata:
  annotations:
    meta.upbound.io/example-id: cloudprovider/v1alpha1/azurecredential
  labels:
    testing.upbound.io/example-name: test
  name: test
  namespace: upbound-system
spec:
  forProvider:
    autoDiscoveryConfiguration:
    - resourceTypeConfigurations:
      - metricConfiguration:
        - name: TotalCoresQuotaUsed
        resourceTypeName: Microsoft.App/containerApps
      - metricConfiguration:
        - aggregations:
          - Average
          dimensions:
          - GeoType
          - ApiName
          name: Availability
        resourceTypeName: Microsoft.Storage/storageAccounts/tableServices
      subscriptionId: my-subscription_id
    clientId: my-client-id
    clientSecretSecretRef:
      key: example-key
      name: example-secret
    cloudStackSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    name: test-name
    resourceDiscoveryTagFilter:
    - key: key-1
      value: value-1
    - key: key-2
      value: value-2
    resourceTagsToAddToMetrics:
    - tag1
    - tag2
    staticLabels:
      label1: value1
      label2: value2
    tenantId: my-tenant-id
