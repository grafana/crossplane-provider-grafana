apiVersion: oss.grafana.crossplane.io/v1alpha1
kind: DataSourceCacheConfig
metadata:
  annotations:
    meta.upbound.io/example-id: oss/v1alpha1/datasourcecacheconfig
  labels:
    testing.upbound.io/example-name: loki_cache
  name: loki-cache
spec:
  forProvider:
    datasourceUid: ${grafana_data_source.loki.uid}
    enabled: true
    ttlQueriesMs: 60000
    ttlResourcesMs: 300000
    useDefaultTtl: false

---

apiVersion: oss.grafana.crossplane.io/v1alpha1
kind: DataSource
metadata:
  annotations:
    meta.upbound.io/example-id: oss/v1alpha1/datasourcecacheconfig
  labels:
    testing.upbound.io/example-name: loki
  name: loki
spec:
  forProvider:
    name: loki
    type: loki
    url: http://localhost:3100
