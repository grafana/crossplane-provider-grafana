apiVersion: cloudprovider.grafana.crossplane.io/v1alpha1
kind: AwsResourceMetadataScrapeJob
metadata:
  annotations:
    meta.upbound.io/example-id: cloudprovider/v1alpha1/awsresourcemetadatascrapejob
  labels:
    testing.upbound.io/example-name: test
  name: test
spec:
  forProvider:
    awsAccountSelector:
      matchLabels:
        testing.upbound.io/example-name: test
    cloudStackSelector:
      matchLabels:
        testing.upbound.io/example-name: grafana_cloud_stack
    name: my-aws-resource-metadata-scrape-job
    service:
    - name: AWS/EC2
      resourceDiscoveryTagFilter:
      - key: k8s.io/cluster-autoscaler/enabled
        value: "true"
      scrapeIntervalSeconds: 300
    staticLabels:
      label1: value1
      label2: value2

---

apiVersion: cloudprovider.grafana.crossplane.io/v1alpha1
kind: AwsAccount
metadata:
  annotations:
    meta.upbound.io/example-id: cloudprovider/v1alpha1/awsresourcemetadatascrapejob
  labels:
    testing.upbound.io/example-name: test
  name: test
spec:
  forProvider:
    cloudStackSelector:
      matchLabels:
        testing.upbound.io/example-name: grafana_cloud_stack
    regions:
    - us-east-1
    - us-east-2
    - us-west-1
    roleArn: ${data.aws_iam_role.test.arn}
