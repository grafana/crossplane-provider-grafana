apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xoncallschedules.oncall.grafana.crossplane.grafana.net
spec:
  group: oncall.grafana.crossplane.grafana.net
  names:
    kind: XOnCallSchedule
    plural: xoncallschedules
  claimNames:
    kind: OnCallSchedule
    plural: oncallschedules
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - name
                - type
                - teamName
                - slackChannelName
                - providerConfigRef
              properties:
                name:
                  type: string
                  description: The schedule's name.
                type:
                  type: string
                  description: "The schedule's type."
                  enum: [ical, calendar, web]
                teamName:
                  type: string
                  description: >
                    Name of the OnCall team. An observed Team resource is co-composed
                    and resolved via matchControllerRef.
                slackChannelName:
                  type: string
                  description: >
                    Name of the Slack channel. An observed SlackChannel resource is
                    co-composed and resolved via matchControllerRef.
                timeZone:
                  type: string
                  description: "The schedule's time zone."
                shifts:
                  type: array
                  description: The list of ID's of on-call shifts.
                  items:
                    type: string
                icalUrlPrimary:
                  type: string
                  description: The URL of the external calendar iCal file.
                icalUrlOverrides:
                  type: string
                  description: The URL of external iCal calendar which override primary events.
                enableWebOverrides:
                  type: boolean
                  description: Enable overrides via web UI (it will ignore ical_url_overrides).
                providerConfigRef:
                  type: object
                  description: ProviderConfigRef to use for all composed resources.
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    policy:
                      type: object
                      properties:
                        resolve:
                          type: string
                          enum: [Always, IfNotPresent]
---
# Composition for an OnCall Schedule with team and Slack channel references.
# Observed resources (Team, SlackChannel) are co-composed so that the Schedule's
# native selectors with matchControllerRef can auto-resolve them.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: oncall-schedule
spec:
  compositeTypeRef:
    apiVersion: oncall.grafana.crossplane.grafana.net/v1alpha1
    kind: XOnCallSchedule
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: team
            base:
              apiVersion: oncall.grafana.o.crossplane.io/v1alpha1
              kind: Team
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.teamName
                toFieldPath: spec.forProvider.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.providerConfigRef
                toFieldPath: spec.providerConfigRef
          - name: slack-channel
            base:
              apiVersion: oncall.grafana.o.crossplane.io/v1alpha1
              kind: SlackChannel
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.slackChannelName
                toFieldPath: spec.forProvider.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.providerConfigRef
                toFieldPath: spec.providerConfigRef
          - name: schedule
            base:
              apiVersion: oncall.grafana.m.crossplane.io/v1alpha1
              kind: Schedule
              spec:
                forProvider:
                  teamSelector:
                    matchControllerRef: true
                  slack:
                    - slackChannelSelector:
                        matchControllerRef: true
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.name
                toFieldPath: spec.forProvider.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.type
                toFieldPath: spec.forProvider.type
              - type: FromCompositeFieldPath
                fromFieldPath: spec.timeZone
                toFieldPath: spec.forProvider.timeZone
                policy:
                  fromFieldPath: Optional
              - type: FromCompositeFieldPath
                fromFieldPath: spec.shifts
                toFieldPath: spec.forProvider.shifts
                policy:
                  fromFieldPath: Optional
              - type: FromCompositeFieldPath
                fromFieldPath: spec.icalUrlPrimary
                toFieldPath: spec.forProvider.icalUrlPrimary
                policy:
                  fromFieldPath: Optional
              - type: FromCompositeFieldPath
                fromFieldPath: spec.icalUrlOverrides
                toFieldPath: spec.forProvider.icalUrlOverrides
                policy:
                  fromFieldPath: Optional
              - type: FromCompositeFieldPath
                fromFieldPath: spec.enableWebOverrides
                toFieldPath: spec.forProvider.enableWebOverrides
                policy:
                  fromFieldPath: Optional
              - type: FromCompositeFieldPath
                fromFieldPath: spec.providerConfigRef
                toFieldPath: spec.providerConfigRef
    - step: automatically-detect-ready-composed-resources
      functionRef:
        name: function-auto-ready
---
# Example claim: calendar schedule with team and slack channel.
apiVersion: oncall.grafana.crossplane.grafana.net/v1alpha1
kind: OnCallSchedule
metadata:
  name: my-schedule
  namespace: default
spec:
  name: primary-schedule
  type: calendar
  teamName: my-team
  slackChannelName: oncall-notifications
  timeZone: America/New_York
  providerConfigRef:
    name: grafana
