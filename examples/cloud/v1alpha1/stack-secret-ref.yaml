# E2E test for stackSecretRef on ProviderConfig.
#
# Verifies that the url (and other endpoint fields) are correctly resolved from
# an observed Stack's connection secret via stackSecretRef. The setup script
# creates an observed Stack that publishes connection details to a Secret and a
# ClusterProviderConfig that references it via stackSecretRef. The auth-only
# instance credentials secret intentionally omits the url — it comes exclusively
# from the stack secret. If stackSecretRef resolution fails, the Folder creation
# below will fail because the provider won't know where to connect.
---
apiVersion: oss.grafana.m.crossplane.io/v1alpha1
kind: Folder
metadata:
  annotations:
    uptest.upbound.io/disable-import: "true"
    meta.upbound.io/example-id: cloud/v1alpha1/stack-secret-ref
  name: e2e-stack-secret-ref-folder
  namespace: upbound-system
spec:
  forProvider:
    title: e2e-stack-secret-ref-folder
  providerConfigRef:
    kind: ClusterProviderConfig
    name: e2e-cloud-instance
